# VictoriaMetrics 内蔵スクレイパー設定 (配置先: /etc/victoria-metrics/scrape.yml)
# victoria-metrics.service の -promscrape.config から参照される
global:
  scrape_interval: 60s

scrape_configs:
  - job_name: node
    static_configs:
      - targets: ["localhost:9100"]
  - job_name: victoria-metrics
    static_configs:
      - targets: ["localhost:8428"]
