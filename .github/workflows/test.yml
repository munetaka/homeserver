name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Run tests with coverage
        run: uv run pytest --cov
      - name: Lint deploy scripts
        run: shellcheck deploy/bin/*.sh
