name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # setup-uv は v8 からメジャータグ (@v8) を公開しないため完全バージョンで指定
      - uses: astral-sh/setup-uv@v8.3.2
      - name: Run tests with coverage
        run: uv run pytest --cov
      - name: Coverage summary
        # カバレッジ不足 (fail_under) でテストが落ちたときこそ内訳を見たいので always。
        # --fail-under=0 は summary 出力ステップ自体が二重に失敗しないようにするため
        if: always()
        run: |
          if [ -f .coverage ]; then
            echo "## Coverage" >> "$GITHUB_STEP_SUMMARY"
            uv run coverage report --format=markdown --fail-under=0 >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Lint deploy scripts
        run: shellcheck deploy/bin/*.sh scripts/*.sh
